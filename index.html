<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FTS Arrival">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>FTS Arrival</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg:      #0a0a0f;
  --bg2:     #141418;
  --bg3:     #1e1e24;
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.05);
  --accent:  #3b82f6;
  --accent2: #60a5fa;
  --green:   #22c55e;
  --green2:  #16a34a;
  --red:     #ef4444;
  --gold:    #f59e0b;
  --white:   #ffffff;
  --off:     #e2e8f0;
  --muted:   rgba(226,232,240,0.4);
  --muted2:  rgba(226,232,240,0.2);
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--white);
}

body {
  /* Uses dvh — fills exactly the visible screen on all phones */
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0;
}

/* ════════════════════════════
   SETUP SCREEN
════════════════════════════ */
#setupScreen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  gap: 0;
}

.setup-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.setup-title {
  font-size: 24px; font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.setup-title span { color: var(--accent2); }
.setup-desc {
  font-size: 14px; font-weight: 400;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 28px;
  max-width: 300px;
}

.setup-label {
  width: 100%;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.setup-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--white);
  font-size: 14px; font-weight: 500;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-user-select: text;
  user-select: text;
}
.setup-input:focus { border-color: var(--accent); }
.setup-input::placeholder { color: var(--muted2); }

.setup-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px; border: none;
  background: var(--accent);
  color: #fff;
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 4px;
}
.setup-btn:active { transform: scale(0.97); opacity: 0.9; }

.setup-err {
  margin-top: 12px;
  font-size: 13px; color: var(--red);
  text-align: center; display: none;
}
.setup-err.show { display: block; }

/* ════════════════════════════
   MAIN APP SCREEN
════════════════════════════ */
#appScreen {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
#appScreen.show {
  display: flex;
}

/* ── Header ── */
.hdr {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: max(env(safe-area-inset-top), 14px) 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #818cf8);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.brand-name {
  font-size: 18px; font-weight: 800;
  letter-spacing: -0.5px; line-height: 1.1;
}
.brand-name em { font-style: normal; color: var(--accent2); }
.brand-sub {
  font-size: 10px; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); margin-top: 1px;
}

.status {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: 50px;
  background: var(--bg3);
  border: 1px solid var(--border);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--muted);
  transition: all 0.25s;
}
.status.run { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: var(--green); }
.status.stp { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: var(--red); }
.sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted2); flex-shrink: 0;
  transition: background 0.25s;
}
.sdot.live { background: var(--green); animation: blink 1.1s infinite; }
.sdot.dead { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── Timer ── */
.timer-area {
  flex-shrink: 0;
  text-align: center;
  padding: 16px 20px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.timer-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
#timer {
  font-size: clamp(54px, 16vw, 72px);
  font-weight: 800;
  letter-spacing: -3px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  color: var(--off);
  transition: color 0.2s;
}
#timer.run { color: var(--green); }
#timer.stp { color: var(--red); }

#splitInfo {
  margin-top: 8px;
  min-height: 18px;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  display: flex; align-items: center;
  justify-content: center; gap: 6px;
}
.si-name { font-weight: 700; color: var(--accent2); }
.si-time { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--off); }

/* ── Grid ── */
.grid-area {
  flex: 1 1 0;
  min-height: 0;
  padding: 10px 12px 6px;
  display: flex;
  flex-direction: column;
}
.grid-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
  flex-shrink: 0;
}
#grid {
  flex: 1 1 0;
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: 1fr;
  gap: 8px;
}

.act {
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--off);
  font-size: clamp(13px, 4vw, 16px);
  font-weight: 600;
  letter-spacing: -0.2px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 8px;
  text-align: center;
  line-height: 1.3;
  position: relative;
  overflow: hidden;
  transition: transform 0.1s, background 0.15s, border-color 0.15s;
}
/* Gloss sheen */
.act::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 50%;
  border-radius: 14px 14px 0 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
  pointer-events: none;
}
.act:disabled { opacity: 0.15; cursor: not-allowed; }
.act:not(:disabled):active { transform: scale(0.91); }
.act:not(:disabled):hover { background: var(--bg3); border-color: rgba(59,130,246,0.35); }
.act.done {
  background: rgba(34,197,94,0.09);
  border-color: rgba(34,197,94,0.35);
}
.act-split {
  font-size: 12px; font-weight: 600;
  color: var(--green);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
}
.act-num {
  position: absolute; top: 7px; right: 9px;
  font-size: 9px; font-weight: 700;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
}

/* ── Split log ── */
.log {
  flex-shrink: 0;
  margin: 0 12px 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: none;
}
.log.show { display: block; }
.log-hd {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 12px;
  border-bottom: 1px solid var(--border2);
  font-size: 10px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted);
}
.log-cnt { color: var(--accent2); font-variant-numeric: tabular-nums; }
.log-bd { max-height: 76px; overflow-y: auto; }
.log-bd::-webkit-scrollbar { display: none; }
.log-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px;
  border-bottom: 1px solid var(--border2);
  font-size: 13px; font-weight: 500;
  animation: up 0.2s ease;
}
.log-row:last-child { border-bottom: none; }
@keyframes up { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
.ln { width:14px; font-size:10px; font-weight:600; color:var(--muted); flex-shrink:0; }
.lna { flex:1; color:var(--off); }
.lt  { font-variant-numeric:tabular-nums; font-size:12px; font-weight:600; color:var(--green); }

/* ── Bottom ── */
.btm {
  flex-shrink: 0;
  padding: 0 12px max(env(safe-area-inset-bottom), 14px);
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

#btnSave {
  display: none;
  width: 100%; padding: 17px;
  margin-bottom: 9px;
  border-radius: 14px; border: none;
  background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
  color: #fff;
  font-size: 16px; font-weight: 700;
  letter-spacing: -0.2px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(59,130,246,0.35);
  transition: all 0.15s;
}
#btnSave.show { display: block; }
#btnSave:not(:disabled):active { transform: scale(0.97); opacity: 0.9; }
#btnSave:disabled { opacity: 0.45; cursor: not-allowed; }

.ctrl { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

#btnGo, #btnStop {
  height: 60px;
  border-radius: 14px; border: none;
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.2px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all 0.15s;
}
#btnGo:disabled, #btnStop:disabled { opacity: 0.2; cursor: not-allowed; }
#btnGo:not(:disabled):active, #btnStop:not(:disabled):active { transform: scale(0.95); }

#btnGo {
  background: var(--green);
  color: #fff;
  box-shadow: 0 4px 18px rgba(34,197,94,0.3);
}
#btnGo:not(:disabled):hover { filter: brightness(1.07); }

#btnStop {
  background: var(--bg3);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.2);
}
#btnStop:not(:disabled):hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom) + 90px);
  left: 50%; transform: translateX(-50%) translateY(10px);
  padding: 11px 22px; border-radius: 50px;
  font-size: 14px; font-weight: 600;
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  background: var(--bg3);
  color: var(--white);
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.toast.ok { background: var(--green2); border-color: transparent; }
.toast.er { background: var(--red); border-color: transparent; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ════ SETUP SCREEN ════ -->
<div id="setupScreen">
  <div class="setup-icon">✈</div>
  <div class="setup-title">FTS <span>Arrival</span></div>
  <div class="setup-desc">Paste your Apps Script URL below to connect the timer to your Google Sheet.</div>

  <div class="setup-label">Apps Script URL</div>
  <input class="setup-input" id="scriptUrl" type="url"
    placeholder="https://script.google.com/macros/s/..."
    autocomplete="off" autocorrect="off" spellcheck="false">

  <button class="setup-btn" onclick="connectScript()">Connect & Load</button>
  <div class="setup-err" id="setupErr"></div>
</div>

<!-- ════ MAIN APP ════ -->
<div id="appScreen">

  <div class="hdr">
    <div class="brand">
      <div class="brand-icon">✈</div>
      <div>
        <div class="brand-name">FTS <em>Arrival</em></div>
        <div class="brand-sub">Ground Process Timer</div>
      </div>
    </div>
    <div class="status" id="status">
      <div class="sdot" id="sdot"></div>
      <span id="sTxt">Ready</span>
    </div>
  </div>

  <div class="timer-area">
    <div class="timer-label">Elapsed</div>
    <div id="timer">0:00.000</div>
    <div id="splitInfo"><span style="color:var(--muted)">Tap Start — then tap each action as it happens</span></div>
  </div>

  <div class="grid-area">
    <div class="grid-label">Ground Actions</div>
    <div id="grid"></div>
  </div>

  <div class="log" id="log">
    <div class="log-hd">
      <span>Splits</span>
      <span class="log-cnt" id="logCnt">0</span>
    </div>
    <div class="log-bd" id="logBd"></div>
  </div>

  <div class="btm">
    <button id="btnSave" onclick="doSave()">Save to Sheet</button>
    <div class="ctrl">
      <button id="btnGo"   onclick="startTimer()">▶ Start</button>
      <button id="btnStop" onclick="stopTimer()" disabled>■ Stop</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Config — saved locally so you only paste the URL once ──
const STORE_KEY = 'fts_script_url';
let SCRIPT_URL = localStorage.getItem(STORE_KEY) || '';

// ── State ──
let actions=[], splits=[], running=false, saving=false;
let t0=null, lastTap=null, ival=null, sessionISO=null, tapN=0;

// ── Boot ──
window.addEventListener('load', () => {
  if (SCRIPT_URL) {
    // Already configured — go straight to loading the app
    showApp();
    loadHeaders();
  }
  // else: setup screen is already visible
});

// ── Setup ──
async function connectScript() {
  const url = document.getElementById('scriptUrl').value.trim();
  const err = document.getElementById('setupErr');
  err.classList.remove('show');

  if (!url.includes('script.google.com')) {
    err.textContent = 'That doesn\'t look like an Apps Script URL. Please check and try again.';
    err.classList.add('show'); return;
  }

  document.querySelector('.setup-btn').textContent = 'Connecting…';
  try {
    const res = await fetch(url + '?action=headers');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!data.actions || data.actions.length === 0) throw new Error('No actions found in sheet');

    localStorage.setItem(STORE_KEY, url);
    SCRIPT_URL = url;
    actions = data.actions;
    showApp();
    buildGrid();
  } catch(e) {
    err.textContent = 'Connection failed: ' + e.message;
    err.classList.add('show');
    document.querySelector('.setup-btn').textContent = 'Connect & Load';
  }
}

function showApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('show');
}

async function loadHeaders() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=headers');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    actions = data.actions;
    buildGrid();
  } catch(e) {
    showToast('Sheet error: ' + e.message, 'er');
  }
}

// ── Grid ──
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  actions.forEach((a, i) => {
    const b = document.createElement('button');
    b.className = 'act';
    b.id = 'ab'+i;
    b.disabled = true;
    b.innerHTML = `${a.name}<span class="act-split" id="as${i}"></span>`;
    b.addEventListener('click', () => tapAction(i));
    g.appendChild(b);
  });
}

// ── Timer ──
function startTimer() {
  if (running) return;
  running=true; saving=false;
  t0 = lastTap = performance.now();
  sessionISO = new Date().toISOString();
  tapN=0; splits=[];

  ival = setInterval(() => {
    document.getElementById('timer').textContent = fmt(performance.now()-t0);
  }, 41);

  document.getElementById('timer').className = 'run';
  setStatus('run');
  document.getElementById('btnGo').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnSave').classList.remove('show');
  document.getElementById('log').classList.remove('show');
  document.getElementById('logBd').innerHTML = '';
  document.getElementById('logCnt').textContent = '0';
  setSplitInfo(null);
  actions.forEach((_,i) => {
    const b = document.getElementById('ab'+i);
    b.className='act'; b.disabled=false;
    document.getElementById('as'+i).textContent='';
    const n = b.querySelector('.act-num'); if(n) n.remove();
  });
}

function stopTimer() {
  if (!running) return;
  running=false;
  clearInterval(ival);
  document.getElementById('timer').className = 'stp';
  setStatus('stp');
  document.getElementById('btnGo').disabled = false;
  document.getElementById('btnStop').disabled = true;
  actions.forEach((_,i) => document.getElementById('ab'+i).disabled=true);
  if (splits.length > 0) {
    document.getElementById('btnSave').classList.add('show');
    setSplitInfo(null, splits.length+' split'+(splits.length>1?'s':'')+' — tap Save');
  } else {
    setSplitInfo(null, 'No splits recorded');
  }
}

function tapAction(i) {
  if (!running) return;
  const now = performance.now();
  const delta = now - lastTap;
  lastTap = now; tapN++;
  const name = actions[i].name;
  const ex = splits.findIndex(s=>s.actionName===name);
  if (ex!==-1) splits.splice(ex,1);
  splits.push({actionName:name, deltaMs:delta});

  const btn = document.getElementById('ab'+i);
  btn.className='act done';
  document.getElementById('as'+i).textContent = fmt(delta);
  let badge = btn.querySelector('.act-num');
  if (!badge) { badge=document.createElement('span'); badge.className='act-num'; btn.appendChild(badge); }
  badge.textContent='#'+tapN;
  setSplitInfo(name, fmt(delta));
  addLog(name, delta, tapN);
}

function setSplitInfo(name, val) {
  const el = document.getElementById('splitInfo');
  if (name) {
    el.innerHTML=`<span class="si-name">${name}</span><span style="color:var(--muted)">→</span><span class="si-time">${val}</span>`;
  } else if (val) {
    el.innerHTML=`<span style="color:var(--muted)">${val}</span>`;
  } else {
    el.innerHTML=`<span style="color:var(--muted)">Tap Start — then tap each action as it happens</span>`;
  }
}

function addLog(name, delta, n) {
  const bd = document.getElementById('logBd');
  const ex = bd.querySelector(`[data-k="${name}"]`);
  if (ex) ex.remove();
  const r = document.createElement('div');
  r.className='log-row'; r.dataset.k=name;
  r.innerHTML=`<span class="ln">${n}</span><span class="lna">${name}</span><span class="lt">${fmt(delta)}</span>`;
  bd.appendChild(r); bd.scrollTop=bd.scrollHeight;
  document.getElementById('logCnt').textContent=splits.length;
  document.getElementById('log').classList.add('show');
}

// ── Save ──
async function doSave() {
  if (saving) return;
  saving=true;
  const btn = document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='Saving…';
  try {
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify({startTimeISO:sessionISO, splits})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showToast('✓ Saved to row '+data.row, 'ok');
    setTimeout(resetAll, 1400);
  } catch(e) {
    showToast('Save failed: '+e.message, 'er');
    saving=false; btn.disabled=false; btn.textContent='Save to Sheet';
  }
}

function resetAll() {
  clearInterval(ival);
  running=false; saving=false; tapN=0;
  splits=[]; t0=null; lastTap=null;
  document.getElementById('timer').textContent='0:00.000';
  document.getElementById('timer').className='';
  document.getElementById('btnGo').disabled=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('btnSave').classList.remove('show');
  document.getElementById('log').classList.remove('show');
  document.getElementById('logBd').innerHTML='';
  document.getElementById('logCnt').textContent='0';
  setSplitInfo(null);
  setStatus('');
  actions.forEach((_,i)=>{
    const b=document.getElementById('ab'+i);
    b.className='act'; b.disabled=true;
    document.getElementById('as'+i).textContent='';
    const n=b.querySelector('.act-num'); if(n) n.remove();
  });
}

// ── Helpers ──
function fmt(ms) {
  const t=Math.round(ms);
  return `${Math.floor(t/60000)}:${String(Math.floor((t%60000)/1000)).padStart(2,'0')}.${String(t%1000).padStart(3,'0')}`;
}
function setStatus(type) {
  const s=document.getElementById('status');
  const d=document.getElementById('sdot');
  s.className='status'+(type?' '+type:'');
  d.className='sdot'+(type==='run'?' live':type==='stp'?' dead':'');
  document.getElementById('sTxt').textContent=type==='run'?'Running':type==='stp'?'Stopped':'Ready';
}
function showToast(msg,type) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>{t.className='toast '+type;},3000);
}
</script>
