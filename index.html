<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FTS Arrival">
<meta name="theme-color" content="#0a0a0f">
<title>FTS Arrival</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg:#0a0a0f; --bg2:#141418; --bg3:#1e1e24;
  --border:rgba(255,255,255,0.08);
  --accent:#3b82f6; --accent2:#60a5fa;
  --green:#22c55e; --red:#ef4444;
  --gold:#f59e0b; --purple:#a855f7;
  --taxi:#f97316; --sky:#38bdf8;
  --white:#fff; --off:#e2e8f0;
  --muted:rgba(226,232,240,0.38);
  --muted2:rgba(226,232,240,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;font-family:'Inter',-apple-system,sans-serif;}
html{height:100%;background:var(--bg);}
body{width:100%;height:100dvh;display:flex;flex-direction:column;position:fixed;inset:0;background:var(--bg);color:var(--white);overflow:hidden;}

/* ══ SETUP ══ */
#setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.s-icon{font-size:42px;margin-bottom:12px;}
.s-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.s-title span{color:var(--accent2);}
.s-desc{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:22px;max-width:280px;}
.s-lbl{width:100%;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.s-inp{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--white);font-size:13px;font-weight:500;margin-bottom:12px;outline:none;transition:border-color .2s;-webkit-user-select:text;user-select:text;}
.s-btn{width:100%;padding:14px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}

/* ══ APP ══ */
#app{display:none;flex-direction:column;height:100%;overflow:hidden;}
#app.show{display:flex;}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),10px) 14px 6px;border-bottom:1px solid var(--border);background:var(--bg);gap:10px;}
.timer-block{display:flex;flex-direction:column;}
.elapsed-lbl{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;}
#timer{font-size:26px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:var(--off);line-height:1.1;}
#timer.run{color:var(--green);}
#timer.stp{color:var(--red);}
.spill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:50px;background:var(--bg3);border:1px solid var(--border);font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--muted2);}
.sdot.live{background:var(--green);animation:blink 1.1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.grid-wrap{flex:1 1 0;min-height:0;padding:7px 9px 5px;}
#grid{width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:7px;}
.act{border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:var(--off);font-size:clamp(14px,4.5vw,18px);font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;width:100%;height:100%;}
.act:disabled{opacity:.13;}
.act.done{background-color:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);}
.act-split{font-size:13px;font-weight:600;color:var(--green);}
.act-num{position:absolute;top:8px;right:10px;font-size:10px;color:var(--gold);}

.btm{flex-shrink:0;padding:7px 9px max(env(safe-area-inset-bottom),10px);background:var(--bg);border-top:1px solid var(--border);}
#btnFinish{display:none;width:100%;padding:14px;margin-bottom:7px;border-radius:14px;border:none;background:linear-gradient(135deg,#f97316 0%,#ea580c 100%);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(249,115,22,.3);}
#btnFinish.show{display:block;}
.ctrl{display:grid;grid-template-columns:1fr 1fr auto;gap:7px;}
#btnGo,#btnStop,#btnSync{height:52px;border-radius:14px;border:none;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
#btnGo{background:var(--green);color:#fff;}
#btnStop{background:var(--bg3);color:var(--red);border:1px solid rgba(239,68,68,.2);}
#btnSync{width:52px;background:var(--bg3);border:1px solid var(--border);color:var(--purple);}

/* ══ MAP MODAL ══ */
#routeModal{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column;}
#routeModal.show{display:flex;}
.modal-hdr{flex-shrink:0;padding:max(env(safe-area-inset-top),14px) 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title span{color:var(--taxi);}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;}

.taxi-section{flex-shrink:0;padding:10px 12px 8px;border-bottom:1px solid var(--border);}
.taxi-row{display:flex;gap:8px;}
.taxi-btn{flex:1;padding:12px 8px;border-radius:12px;border:2px solid rgba(249,115,22,.35);background:rgba(249,115,22,.07);color:var(--taxi);font-size:20px;font-weight:900;cursor:pointer;}
.taxi-btn.selected{background:rgba(249,115,22,.2);border-color:var(--taxi);}

.map-scroll{flex:1;overflow-y:auto;padding:10px;}
.apron{position:relative;width:320px;height:820px;margin:0 auto;}
.apron-svg{position:absolute;inset:0;width:100%;height:100%;}
.lot {
  position:absolute;width:38px;height:38px;border-radius:8px;
  background:rgba(30,30,36,0.9);border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.lot.selected{background:var(--accent);border-color:var(--accent2);box-shadow:0 0 15px var(--accent);z-index:10;}
.lot.b-lot{border:2.5px solid var(--accent);color:var(--accent);}
.lot.b-lot.selected{background:var(--accent);color:#fff;}

.modal-save-wrap{padding:8px 12px max(env(safe-area-inset-bottom),12px);background:var(--bg);border-top:1px solid var(--border);}
#btnModalSave{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#fff;font-weight:700;opacity:.3;pointer-events:none;}
#btnModalSave.ready{opacity:1;pointer-events:auto;}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:50px;background:var(--bg3);color:#fff;font-size:13px;opacity:0;transition:0.3s;z-index:999;border:1px solid var(--border);}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="setup">
  <div class="s-icon">✈</div>
  <div class="s-title">FTS <span>Arrival</span></div>
  <div class="s-desc">Paste your Apps Script URL to connect to your Google Sheet.</div>
  <input class="s-inp" id="scriptUrl" type="url" placeholder="https://script.google.com/...">
  <button class="s-btn" onclick="connectScript()">Connect & Load</button>
</div>

<div id="app">
  <div class="topbar">
    <div class="timer-block">
      <div class="elapsed-lbl">Elapsed</div>
      <div id="timer">0:00.000</div>
    </div>
    <div class="spill" id="spill"><div class="sdot" id="sdot"></div><span id="sTxt">Ready</span></div>
  </div>
  <div class="grid-wrap"><div id="grid"></div></div>
  <div class="btm">
    <button id="btnFinish" onclick="openRouteModal()">✈ Finish Route</button>
    <div class="ctrl">
      <button id="btnGo" onclick="startTimer()">▶ Start</button>
      <button id="btnStop" onclick="stopTimer()" disabled>■ Stop</button>
      <button id="btnSync" onclick="syncQueue()">⇪</button>
    </div>
  </div>
</div>

<div id="routeModal">
  <div class="modal-hdr">
    <div class="modal-title">Finish <span>Route</span></div>
    <div class="modal-close" onclick="closeRouteModal()">✕</div>
  </div>
  <div class="taxi-section">
    <div class="taxi-row">
      <button class="taxi-btn" data-taxi="A" onclick="selectTaxi(this)">A</button>
      <button class="taxi-btn" data-taxi="C" onclick="selectTaxi(this)">C</button>
      <button class="taxi-btn" data-taxi="H" onclick="selectTaxi(this)">H</button>
    </div>
  </div>
  <div class="map-scroll">
    <div class="apron">
      <svg class="apron-svg" viewBox="0 0 320 800">
        <g stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none">
          <path d="M155,20 L175,280 L175,780" />
          <path d="M80,110 L160,110" /><path d="M165,130 L280,130" /><path d="M70,300 L175,300" />
        </g>
      </svg>
      <div id="lotsCont"></div>
    </div>
  </div>
  <div class="modal-save-wrap">
    <button id="btnModalSave" onclick="doSave()">Save to Sheet</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let SCRIPT_URL = localStorage.getItem('fts_url') || '';
let actions = [], splits = [], running = false, saving = false;
let t0 = 0, lastTap = 0, ival = null, sessionISO = null, tapN = 0;
let selTaxi = null, selLot = null;

const LOT_POS = {
  '23':{x:110,y:60},'22':{x:110,y:105},'21':{x:110,y:150},'20':{x:110,y:195},'19':{x:110,y:240},
  '18':{x:135,y:330},'17':{x:135,y:375},'16':{x:135,y:420},'15':{x:135,y:465},'14':{x:135,y:510},'13':{x:135,y:555},'12':{x:135,y:600},
  '1':{x:195,y:150},'1A':{x:195,y:190},'2':{x:195,y:230},'3':{x:195,y:275},'4':{x:195,y:320},'5':{x:195,y:365},'6':{x:195,y:410},'7':{x:195,y:455},'8':{x:195,y:500},'9':{x:195,y:545},
  '24':{x:235,y:110},'25':{x:275,y:110},'10':{x:225,y:590},'11':{x:225,y:635},'26':{x:225,y:680},'27':{x:225,y:725},
  '5B':{x:270,y:610},'4B':{x:270,y:650},'3B':{x:270,y:690},'2B':{x:270,y:730},'1B':{x:270,y:770}
};

window.onload = () => { buildMap(); if(SCRIPT_URL) { showApp(); loadHeaders(); } };

async function connectScript() {
  const url = document.getElementById('scriptUrl').value.trim();
  try {
    const res = await fetch(url + '?action=headers');
    const data = await res.json();
    localStorage.setItem('fts_url', url); SCRIPT_URL = url;
    actions = data.actions; showApp(); buildGrid();
  } catch(e) { alert('Connection Failed'); }
}

function showApp() { document.getElementById('setup').style.display='none'; document.getElementById('app').classList.add('show'); }

async function loadHeaders() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=headers');
    const data = await res.json();
    actions = data.actions; buildGrid();
  } catch(e) {}
}

function buildGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  actions.forEach((a,i) => {
    const b = document.createElement('button'); b.className = 'act'; b.id = 'ab'+i; b.disabled = true;
    b.innerHTML = `${a.name}<span class="act-split" id="as${i}"></span>`;
    b.onclick = () => tap(i); g.appendChild(b);
  });
}

function buildMap() {
  const c = document.getElementById('lotsCont'); c.innerHTML = '';
  Object.entries(LOT_POS).forEach(([id, pos]) => {
    const b = document.createElement('div'); b.className = 'lot' + (id.endsWith('B') ? ' b-lot' : '');
    b.style.left = pos.x+'px'; b.style.top = pos.y+'px'; b.textContent = id;
    b.onclick = () => { 
      document.querySelectorAll('.lot').forEach(l=>l.classList.remove('selected'));
      b.classList.add('selected'); selLot = id; checkReady();
    };
    c.appendChild(b);
  });
}

function startTimer() {
  running = true; t0 = lastTap = performance.now(); sessionISO = new Date().toISOString(); splits = []; tapN = 0;
  ival = setInterval(() => { document.getElementById('timer').textContent = fmt(performance.now()-t0); }, 41);
  document.getElementById('timer').className = 'run'; setStatus('run');
  document.getElementById('btnGo').disabled = true; document.getElementById('btnStop').disabled = false;
  actions.forEach((_,i) => { const b = document.getElementById('ab'+i); b.disabled = false; b.className = 'act'; });
}

function stopTimer() {
  running = false; clearInterval(ival);
  document.getElementById('timer').className = 'stp'; setStatus('stp');
  document.getElementById('btnGo').disabled = false; document.getElementById('btnStop').disabled = true;
  document.getElementById('btnFinish').classList.add('show');
}

function tap(i) {
  if(!running) return;
  const now = performance.now(), delta = now - lastTap; lastTap = now; tapN++;
  splits.push({actionName: actions[i].name, deltaMs: delta});
  document.getElementById('ab'+i).classList.add('done');
  document.getElementById('as'+i).textContent = fmt(delta);
  const n = document.createElement('span'); n.className='act-num'; n.textContent='#'+tapN; document.getElementById('ab'+i).appendChild(n);
}

function openRouteModal() {
  selTaxi = null; selLot = null; saving = false;
  document.querySelectorAll('.taxi-btn, .lot').forEach(b=>b.classList.remove('selected'));
  document.getElementById('btnModalSave').classList.remove('ready');
  document.getElementById('routeModal').classList.add('show');
}

function closeRouteModal() { document.getElementById('routeModal').classList.remove('show'); }

function selectTaxi(btn) {
  document.querySelectorAll('.taxi-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); selTaxi = btn.dataset.taxi; checkReady();
}

function checkReady() {
  const b = document.getElementById('btnModalSave');
  if(selTaxi && selLot) b.classList.add('ready'); else b.classList.remove('ready');
}

async function doSave() {
  if(saving) return; saving = true;
  const btn = document.getElementById('btnModalSave'); btn.textContent = 'Saving...';
  const data = {startTimeISO: sessionISO, splits, taxiPoint: selTaxi, parkLot: selLot};
  try {
    const ctrl = new AbortController(); setTimeout(()=>ctrl.abort(), 8000);
    await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify(data), signal: ctrl.signal});
    toast('✓ Saved Successfully');
  } catch(e) {
    let q = JSON.parse(localStorage.getItem('fts_q') || '[]'); q.push(data);
    localStorage.setItem('fts_q', JSON.stringify(q)); toast('Saved Offline');
  }
  closeRouteModal(); reset();
}

function reset() {
  document.getElementById('timer').textContent = '0:00.000'; document.getElementById('timer').className = '';
  document.getElementById('btnFinish').classList.remove('show');
  actions.forEach((_,i) => { const b = document.getElementById('ab'+i); b.className='act'; b.disabled=true; });
}

function syncQueue() {
  let q = JSON.parse(localStorage.getItem('fts_q') || '[]');
  if(!q.length) { toast('Queue Empty'); return; }
  toast('Syncing...');
  Promise.all(q.map(d => fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify(d)})))
    .then(() => { localStorage.setItem('fts_q', '[]'); toast('✓ Synced'); })
    .catch(() => toast('Sync Failed'));
}

function fmt(ms){ const t=Math.round(ms); return `${Math.floor(t/60000)}:${String(Math.floor((t%60000)/1000)).padStart(2,'0')}.${String(t%1000).padStart(3,'0')}`; }
function setStatus(s){ document.getElementById('sdot').className='sdot '+(s==='run'?'live':''); document.getElementById('sTxt').textContent=s==='run'?'Running':s==='stp'?'Stopped':'Ready'; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }
</script>
</body>
</html>
