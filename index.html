<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FTS Arrival">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>FTS Arrival</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg:     #0a0a0f;
  --bg2:    #141418;
  --bg3:    #1e1e24;
  --border: rgba(255,255,255,0.08);
  --accent: #3b82f6;
  --accent2:#60a5fa;
  --green:  #22c55e;
  --red:    #ef4444;
  --gold:   #f59e0b;
  --purple: #a855f7;
  --white:  #ffffff;
  --off:    #e2e8f0;
  --muted:  rgba(226,232,240,0.38);
  --muted2: rgba(226,232,240,0.15);
}

*,*::before,*::after {
  box-sizing:border-box; margin:0; padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;
  font-family:'Inter',-apple-system,sans-serif;
}

html { height:100%; background:var(--bg); }

body {
  width:100%; height:100dvh;
  display:flex; flex-direction:column;
  position:fixed; inset:0;
  background:var(--bg); color:var(--white);
  overflow:hidden;
}

/* ══════════════════════════
   SETUP SCREEN
══════════════════════════ */
#setup {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 24px;
}
.s-icon { font-size:42px; margin-bottom:12px; }
.s-title { font-size:22px; font-weight:800; letter-spacing:-0.5px; margin-bottom:6px; }
.s-title span { color:var(--accent2); }
.s-desc { font-size:13px; color:var(--muted); text-align:center; line-height:1.6; margin-bottom:22px; max-width:280px; }
.s-lbl { width:100%; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.s-inp {
  width:100%; padding:12px 14px;
  background:var(--bg3); border:1px solid var(--border); border-radius:12px;
  color:var(--white); font-size:13px; font-weight:500;
  margin-bottom:12px; outline:none; transition:border-color 0.2s;
  -webkit-user-select:text; user-select:text;
}
.s-inp:focus { border-color:var(--accent); }
.s-inp::placeholder { color:var(--muted2); }
.s-btn {
  width:100%; padding:14px; border-radius:13px; border:none;
  background:var(--accent); color:#fff;
  font-size:15px; font-weight:700; cursor:pointer; transition:all 0.15s;
}
.s-btn:active { transform:scale(0.97); }
.s-err { margin-top:10px; font-size:12px; color:var(--red); text-align:center; display:none; }
.s-err.show { display:block; }

/* ══════════════════════════
   APP SHELL
══════════════════════════ */
#app { display:none; flex-direction:column; height:100%; overflow:hidden; }
#app.show { display:flex; }

/* ── TOP BAR ──
   Left:  big timer (replaces brand text)
   Right: status pill + queue badge on same line
*/
.topbar {
  flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:max(env(safe-area-inset-top),10px) 14px 6px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  gap:10px;
}

/* Timer — now lives in topbar, prominent but compact */
.timer-block { display:flex; flex-direction:column; }
.elapsed-lbl {
  font-size:8px; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase;
  color:var(--muted); line-height:1; margin-bottom:1px;
}
#timer {
  font-size:26px; font-weight:800;
  letter-spacing:-0.5px; font-variant-numeric:tabular-nums;
  color:var(--off); line-height:1.1; transition:color 0.2s;
}
#timer.run { color:var(--green); }
#timer.stp { color:var(--red); }

/* Right side of topbar — status + queue badge on same row */
.topbar-right {
  display:flex; align-items:center; gap:6px; flex-shrink:0;
}

.spill {
  display:flex; align-items:center; gap:5px;
  padding:4px 9px; border-radius:50px;
  background:var(--bg3); border:1px solid var(--border);
  font-size:10px; font-weight:600; letter-spacing:0.4px; text-transform:uppercase;
  color:var(--muted); transition:all 0.25s; white-space:nowrap;
}
.spill.run { background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.3); color:var(--green); }
.spill.stp { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.3); color:var(--red); }
.sdot { width:5px; height:5px; border-radius:50%; background:var(--muted2); transition:background 0.25s; }
.sdot.live { background:var(--green); animation:blink 1.1s infinite; }
.sdot.dead { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* Queue badge — same line as status, top right */
#queueBadge {
  display:none; align-items:center; gap:4px;
  padding:4px 8px; border-radius:50px;
  background:rgba(168,85,247,0.15); border:1px solid rgba(168,85,247,0.35);
  font-size:10px; font-weight:700; color:var(--purple);
  cursor:pointer; white-space:nowrap; touch-action:manipulation;
}
#queueBadge.show { display:flex; }
#queueBadge:active { opacity:0.7; }
.qb-dot { width:5px; height:5px; border-radius:50%; background:var(--purple); animation:blink 1.4s infinite; flex-shrink:0; }

/* ══════════════════════════
   GRID — fills ALL remaining space
══════════════════════════ */
.grid-wrap { flex:1 1 0; min-height:0; padding:7px 9px 5px; }
#grid {
  width:100%; height:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-auto-rows:1fr;
  gap:7px;
}
.act {
  border-radius:16px; border:1px solid var(--border);
  background:var(--bg2); color:var(--off);
  font-size:clamp(14px,4.5vw,18px);
  font-weight:700; letter-spacing:-0.3px;
  cursor:pointer;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:5px; padding:10px 8px;
  text-align:center; line-height:1.25;
  position:relative; overflow:hidden;
  transition:transform 0.1s, background 0.15s, border-color 0.15s;
  background-image:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,transparent 40%);
  width:100%; height:100%;
  touch-action:manipulation;
}
.act:disabled { opacity:0.13; cursor:not-allowed; }
.act:not(:disabled):active { transform:scale(0.90); }
.act.done { background-color:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.4); }
.act-split { font-size:13px; font-weight:600; color:var(--green); font-variant-numeric:tabular-nums; }
.act-num { position:absolute; top:8px; right:10px; font-size:10px; font-weight:700; color:var(--gold); }

/* ══════════════════════════
   BOTTOM BAR
══════════════════════════ */
.btm {
  flex-shrink:0;
  padding:7px 9px max(env(safe-area-inset-bottom),10px);
  background:var(--bg); border-top:1px solid var(--border);
}

/* Save button — locked by default, unlocked 400ms after Stop */
#btnSave {
  display:none;
  width:100%; padding:14px; margin-bottom:7px;
  border-radius:14px; border:none;
  background:linear-gradient(135deg,#3b82f6 0%,#6366f1 100%);
  color:#fff; font-size:15px; font-weight:700;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(59,130,246,0.3);
  transition:opacity 0.2s;
  pointer-events:none;
  opacity:0.45;
  touch-action:manipulation;
}
#btnSave.show   { display:block; }
#btnSave.ready  { pointer-events:auto; opacity:1; }
#btnSave.saving { pointer-events:none; opacity:0.5; }
#btnSave:active { opacity:0.85; }

.ctrl { display:grid; grid-template-columns:1fr 1fr auto; gap:7px; }

#btnGo,#btnStop,#btnSync {
  height:52px; border-radius:14px; border:none;
  font-size:16px; font-weight:700; letter-spacing:-0.2px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:5px;
  transition:all 0.15s;
  touch-action:manipulation;
}
#btnGo:disabled,#btnStop:disabled,#btnSync:disabled { opacity:0.2; cursor:not-allowed; }
#btnGo:not(:disabled):active,#btnStop:not(:disabled):active { transform:scale(0.94); }

#btnGo   { background:var(--green); color:#fff; box-shadow:0 4px 16px rgba(34,197,94,0.28); }
#btnStop { background:var(--bg3); color:var(--red); border:1px solid rgba(239,68,68,0.2); }
#btnStop:not(:disabled):hover { background:rgba(239,68,68,0.1); }

#btnSync {
  width:52px; flex-shrink:0;
  background:var(--bg3); border:1px solid rgba(168,85,247,0.2);
  color:var(--purple); flex-direction:column; gap:1px; font-size:11px;
}
#btnSync.has-queue { border-color:rgba(168,85,247,0.45); background:rgba(168,85,247,0.1); animation:syncpulse 2s infinite; }
@keyframes syncpulse { 0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,0)} 50%{box-shadow:0 0 0 5px rgba(168,85,247,0.15)} }
.sync-icon { font-size:18px; line-height:1; }
.sync-count { font-size:10px; font-weight:800; color:var(--purple); line-height:1; display:none; }
.sync-count.show { display:block; }

/* ── Toast ── */
.toast {
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom)+75px); left:50%;
  transform:translateX(-50%) translateY(10px);
  padding:10px 20px; border-radius:50px;
  font-size:13px; font-weight:600;
  white-space:nowrap; opacity:0; pointer-events:none;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index:999; background:var(--bg3); color:var(--white);
  border:1px solid var(--border); box-shadow:0 8px 28px rgba(0,0,0,0.6);
}
.toast.ok   { background:#16a34a; border-color:transparent; }
.toast.er   { background:var(--red); border-color:transparent; }
.toast.info { background:#6366f1; border-color:transparent; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="s-icon">✈</div>
  <div class="s-title">FTS <span>Arrival</span></div>
  <div class="s-desc">Paste your Apps Script URL to connect to your Google Sheet.</div>
  <div class="s-lbl">Apps Script URL</div>
  <input class="s-inp" id="scriptUrl" type="url"
    placeholder="https://script.google.com/macros/s/..."
    autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="s-btn" id="setupBtn" onclick="connectScript()">Connect & Load</button>
  <div class="s-err" id="setupErr"></div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- Top bar: timer left | status + queue right -->
  <div class="topbar">
    <div class="timer-block">
      <div class="elapsed-lbl">Elapsed</div>
      <div id="timer">0:00.000</div>
    </div>
    <div class="topbar-right">
      <div id="queueBadge" onclick="syncQueue()">
        <div class="qb-dot"></div>
        <span id="queueBadgeTxt">0</span>
      </div>
      <div class="spill" id="spill">
        <div class="sdot" id="sdot"></div>
        <span id="sTxt">Ready</span>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div id="grid"></div>
  </div>

  <!-- Bottom -->
  <div class="btm">
    <button id="btnSave" onclick="doSave()">✈ Save to Sheet</button>
    <div class="ctrl">
      <button id="btnGo"   onclick="startTimer()">▶ Start</button>
      <button id="btnStop" onclick="stopTimer()" disabled>■ Stop</button>
      <button id="btnSync" onclick="syncQueue()">
        <span class="sync-icon">⇪</span>
        <span class="sync-count" id="syncCount">0</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE_URL   = 'fts_script_url';
const STORE_QUEUE = 'fts_offline_queue';
let SCRIPT_URL = localStorage.getItem(STORE_URL) || '';

let actions=[], splits=[], running=false, saving=false;
let t0=null, lastTap=null, ival=null, sessionISO=null, tapN=0;
let saveUnlockTimer=null;

// ── Queue helpers ──
function getQueue(){ try{return JSON.parse(localStorage.getItem(STORE_QUEUE)||'[]');}catch{return[];} }
function saveQueue(q){ localStorage.setItem(STORE_QUEUE,JSON.stringify(q)); }
function pushToQueue(s){ const q=getQueue(); q.push(s); saveQueue(q); updateSyncUI(); }
function updateSyncUI(){
  const n=getQueue().length;
  const sc=document.getElementById('syncCount');
  const sb=document.getElementById('btnSync');
  const qb=document.getElementById('queueBadge');
  const qt=document.getElementById('queueBadgeTxt');
  sc.textContent=n; sc.className=n>0?'sync-count show':'sync-count';
  sb.className=n>0?'has-queue':'';
  if(n>0){ qb.classList.add('show'); qt.textContent=n+' offline'; }
  else    { qb.classList.remove('show'); }
}

// ── Boot ──
window.addEventListener('load',()=>{ updateSyncUI(); if(SCRIPT_URL){showApp();loadHeaders();} });

// ── Setup ──
async function connectScript(){
  const url=document.getElementById('scriptUrl').value.trim();
  const err=document.getElementById('setupErr');
  const btn=document.getElementById('setupBtn');
  err.classList.remove('show');
  if(!url.includes('script.google.com')){ err.textContent="Doesn't look like an Apps Script URL."; err.classList.add('show'); return; }
  btn.textContent='Connecting…';
  try{
    const res=await fetch(url+'?action=headers');
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    if(!data.actions?.length) throw new Error('No actions found');
    localStorage.setItem(STORE_URL,url); SCRIPT_URL=url; actions=data.actions;
    showApp(); buildGrid();
  }catch(e){ err.textContent='Failed: '+e.message; err.classList.add('show'); btn.textContent='Connect & Load'; }
}
function showApp(){ document.getElementById('setup').style.display='none'; document.getElementById('app').classList.add('show'); }
async function loadHeaders(){
  try{
    const res=await fetch(SCRIPT_URL+'?action=headers');
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    actions=data.actions; buildGrid();
  }catch(e){ showToast('Sheet error: '+e.message,'er'); }
}

// ── Grid ──
function buildGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  actions.forEach((a,i)=>{
    const b=document.createElement('button');
    b.className='act'; b.id='ab'+i; b.disabled=true;
    b.innerHTML=`${a.name}<span class="act-split" id="as${i}"></span>`;
    b.addEventListener('click',()=>tapAction(i));
    g.appendChild(b);
  });
}

// ── Start ──
function startTimer(){
  if(running) return;
  clearTimeout(saveUnlockTimer);
  hideSave();
  running=true; saving=false;
  t0=lastTap=performance.now();
  sessionISO=new Date().toISOString();
  tapN=0; splits=[];
  ival=setInterval(()=>{ document.getElementById('timer').textContent=fmt(performance.now()-t0); },41);
  document.getElementById('timer').className='run';
  setStatus('run');
  document.getElementById('btnGo').disabled=true;
  document.getElementById('btnStop').disabled=false;
  actions.forEach((_,i)=>{
    const b=document.getElementById('ab'+i);
    b.className='act'; b.disabled=false;
    document.getElementById('as'+i).textContent='';
    const n=b.querySelector('.act-num'); if(n) n.remove();
  });
}

// ── Stop — fully separated from Save ──
function stopTimer(){
  if(!running) return;
  running=false;
  clearInterval(ival); ival=null;
  document.getElementById('timer').className='stp';
  setStatus('stp');
  document.getElementById('btnGo').disabled=false;
  document.getElementById('btnStop').disabled=true;
  actions.forEach((_,i)=>document.getElementById('ab'+i).disabled=true);

  if(splits.length>0){
    // Show Save but keep locked — unlocks after 400ms
    const btn=document.getElementById('btnSave');
    btn.textContent='✈ Save to Sheet';
    btn.classList.add('show');
    btn.classList.remove('ready','saving');
    btn.disabled=false;
    saveUnlockTimer=setTimeout(()=>{ btn.classList.add('ready'); },400);
  }
}

function hideSave(){
  const btn=document.getElementById('btnSave');
  btn.classList.remove('show','ready','saving');
  btn.disabled=false;
  btn.textContent='✈ Save to Sheet';
}

// ── Tap action ──
function tapAction(i){
  if(!running) return;
  const now=performance.now();
  const delta=now-lastTap; lastTap=now; tapN++;
  const name=actions[i].name;
  const ex=splits.findIndex(s=>s.actionName===name);
  if(ex!==-1) splits.splice(ex,1);
  splits.push({actionName:name,deltaMs:delta});
  const btn=document.getElementById('ab'+i);
  btn.className='act done';
  document.getElementById('as'+i).textContent=fmt(delta);
  let badge=btn.querySelector('.act-num');
  if(!badge){badge=document.createElement('span');badge.className='act-num';btn.appendChild(badge);}
  badge.textContent='#'+tapN;
}

// ── Save — the bug was: after offline queue, saving flag stayed true
//    and button was never reset. Fixed by always resetting in finally. ──
async function doSave(){
  const btn=document.getElementById('btnSave');
  // Hard guards
  if(saving) return;
  if(running) return;
  if(!btn.classList.contains('ready')) return;
  if(splits.length===0) return;

  saving=true;
  btn.classList.add('saving');
  btn.classList.remove('ready');
  btn.textContent='Saving…';

  const session={startTimeISO:sessionISO, splits:[...splits]};

  try{
    const res=await Promise.race([
      fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(session)}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
    ]);
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    // ✅ Online save success
    showToast('✓ Saved to row '+data.row,'ok');
    setTimeout(resetAll,1400);
  }catch(e){
    // ✅ Offline — queue it, then FULLY reset so next save works
    pushToQueue(session);
    showToast('Offline — queued ('+getQueue().length+' pending)','info');
    setTimeout(resetAll,1800);
  }
  // saving flag is reset inside resetAll — no need here
}

// ── Sync offline queue ──
async function syncQueue(){
  const q=getQueue();
  if(q.length===0){ showToast('Nothing to sync','info'); return; }
  const syncBtn=document.getElementById('btnSync');
  syncBtn.disabled=true;
  showToast('Syncing '+q.length+'…','info');
  let saved=0, failed=[];
  for(const session of q){
    try{
      const res=await Promise.race([
        fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(session)}),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
      ]);
      const data=await res.json();
      if(data.error) throw new Error(data.error);
      saved++;
    }catch(e){ failed.push(session); }
  }
  saveQueue(failed); updateSyncUI(); syncBtn.disabled=false;
  if(failed.length===0) showToast('✓ All '+saved+' synced!','ok');
  else showToast('Synced '+saved+', '+failed.length+' still failed','er');
}

// ── Reset — always brings app back to clean state ──
function resetAll(){
  clearTimeout(saveUnlockTimer);
  clearInterval(ival); ival=null;
  running=false; saving=false; tapN=0;  // ← saving=false here is the key fix
  splits=[]; t0=null; lastTap=null;
  document.getElementById('timer').textContent='0:00.000';
  document.getElementById('timer').className='';
  document.getElementById('btnGo').disabled=false;
  document.getElementById('btnStop').disabled=true;
  hideSave();
  setStatus('');
  updateSyncUI();
  actions.forEach((_,i)=>{
    const b=document.getElementById('ab'+i);
    b.className='act'; b.disabled=true;
    document.getElementById('as'+i).textContent='';
    const n=b.querySelector('.act-num'); if(n) n.remove();
  });
}

// ── Helpers ──
function fmt(ms){
  const t=Math.round(ms);
  return `${Math.floor(t/60000)}:${String(Math.floor((t%60000)/1000)).padStart(2,'0')}.${String(t%1000).padStart(3,'0')}`;
}
function setStatus(type){
  document.getElementById('spill').className='spill'+(type?' '+type:'');
  document.getElementById('sdot').className='sdot'+(type==='run'?' live':type==='stp'?' dead':'');
  document.getElementById('sTxt').textContent=type==='run'?'Running':type==='stp'?'Stopped':'Ready';
}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>{t.className='toast '+type;},3200);
}
</script>
</body>
</html>
