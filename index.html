<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FTS Arrival</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
  --bg:#0a0a0f; --bg2:#141418; --bg3:#1e1e24;
  --border:rgba(255,255,255,0.08);
  --accent:#3b82f6; --accent2:#60a5fa;
  --green:#22c55e; --red:#ef4444;
  --gold:#f59e0b; --taxi:#f97316;
  --white:#fff; --muted:rgba(226,232,240,0.38);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;font-family:'Inter',sans-serif;}
body{width:100%;height:100dvh;background:var(--bg);color:var(--white);overflow:hidden;display:flex;flex-direction:column;}

/* ══ SETUP PAGE ══ */
#setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.s-icon{font-size:42px;margin-bottom:12px;}
.s-title{font-size:22px;font-weight:800;margin-bottom:6px;}
.s-title span{color:var(--accent2);}
.s-desc{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:22px;max-width:280px;}
.s-lbl{width:100%;max-width:320px;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.s-inp{width:100%;max-width:320px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:#fff;margin-bottom:12px;outline:none;}
.s-btn{width:100%;max-width:320px;padding:16px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;}

/* ══ MAIN APP ══ */
#app{display:none;flex-direction:column;height:100%;}
#app.show{display:flex;}
.topbar{padding:max(env(safe-area-inset-top),10px) 15px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;}
.elapsed-lbl{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:1px;}
#timer{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;}
#timer.run{color:var(--green);}
.spill{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:50px;background:var(--bg2);border:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.sdot.live{background:var(--green);animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3}}

.grid-wrap{flex:1;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;overflow-y:auto;}
.act{position:relative;border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:#fff;font-size:16px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px;transition:all .1s;}
.act:disabled{opacity:0.15;}
.act.done{border-color:var(--green);background:rgba(34,197,94,0.1);color:var(--green);}
.act-split{font-size:12px;margin-top:4px;font-weight:600;}
.act-num{position:absolute;top:8px;right:10px;font-size:10px;color:var(--gold);}

.btm{padding:10px 15px max(env(safe-area-inset-bottom),15px);border-top:1px solid var(--border);background:var(--bg);}
#btnFinish{display:none;width:100%;padding:16px;border-radius:14px;background:var(--taxi);color:#fff;font-weight:800;border:none;margin-bottom:8px;box-shadow:0 4px 15px rgba(249,115,22,0.3);}
#btnFinish.show{display:block;}
.ctrl{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;}
.ctrl button{height:54px;border-radius:14px;border:none;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:6px;}
#btnGo{background:var(--green);color:#fff;}
#btnStop{background:var(--bg3);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
#btnSync{width:54px;background:var(--bg3);color:var(--accent);border:1px solid var(--border);}

/* ══ MAP MODAL (Merged Layout) ══ */
#routeModal{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;}
#routeModal.show{display:flex;}
.modal-hdr{padding:max(env(safe-area-inset-top),15px) 15px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.taxi-row{padding:12px;display:flex;gap:8px;border-bottom:1px solid var(--border);}
.taxi-btn{flex:1;padding:14px;border-radius:12px;border:2px solid rgba(249,115,22,0.2);background:transparent;color:var(--taxi);font-weight:900;font-size:18px;}
.taxi-btn.selected{background:rgba(249,115,22,0.2);border-color:var(--taxi);}

.map-scroll{flex:1;overflow:auto;padding:20px;position:relative;background:#050508;}
.apron{position:relative;width:320px;height:820px;margin:0 auto;}
.apron-svg{position:absolute;inset:0;width:100%;height:100%;}

.lot {
  position:absolute;width:36px;height:36px;border-radius:8px;
  background:var(--bg3);border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:all 0.1s;
}
.lot.selected{background:var(--accent);border-color:var(--accent2);box-shadow:0 0 15px var(--accent);z-index:10;}
/* Blue B-lots styling */
.lot.b-lot{border:2px solid var(--accent);color:var(--accent);}
.lot.b-lot.selected{background:var(--accent);color:#fff;}

.modal-save-wrap{padding:12px 15px max(env(safe-area-inset-bottom),15px);background:var(--bg);border-top:1px solid var(--border);}
#btnModalSave{
  width:100%;padding:18px;border-radius:16px;border:none;
  background:#16a34a;color:#fff;font-size:18px;font-weight:800;
  opacity:0.2;pointer-events:none;transition:all 0.2s;
}
#btnModalSave.ready{opacity:1;pointer-events:auto;box-shadow:0 5px 20px rgba(22,163,74,0.4);}

.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:50px;background:var(--bg3);color:#fff;font-weight:600;opacity:0;transition:0.3s;z-index:999;border:1px solid var(--border);}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="setup">
  <div class="s-icon">✈</div>
  <div class="s-title">FTS <span>Arrival</span></div>
  <p class="s-desc">Paste your Apps Script URL to connect to your Google Sheet.</p>
  <div class="s-lbl">Apps Script URL</div>
  <input class="s-inp" id="scriptUrl" type="url" placeholder="https://script.google.com/...">
  <button class="s-btn" onclick="connect()">Connect & Load</button>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="elapsed-lbl">Elapsed</div>
      <div id="timer">0:00.000</div>
    </div>
    <div class="spill"><div id="sdot" class="sdot"></div><span id="sTxt">Ready</span></div>
  </div>
  <div class="grid-wrap" id="grid"></div>
  <div class="btm">
    <button id="btnFinish" onclick="openRoute()">✈ Finish Route</button>
    <div class="ctrl">
      <button id="btnGo" onclick="start()">▶ START</button>
      <button id="btnStop" onclick="stop()" disabled>■ STOP</button>
      <button id="btnSync" onclick="sync()">⇪</button>
    </div>
  </div>
</div>

<div id="routeModal">
  <div class="modal-hdr">
    <h3 style="font-weight:900;letter-spacing:-0.5px;">FINISH <span style="color:var(--taxi)">ROUTE</span></h3>
    <div onclick="closeRoute()" style="padding:10px;font-weight:800;color:var(--muted);cursor:pointer;">✕</div>
  </div>
  <div class="taxi-row">
    <button class="taxi-btn" data-taxi="A" onclick="selT(this)">A</button>
    <button class="taxi-btn" data-taxi="C" onclick="selT(this)">C</button>
    <button class="taxi-btn" data-taxi="H" onclick="selT(this)">H</button>
  </div>
  <div class="map-scroll">
    <div class="apron">
      <svg class="apron-svg" viewBox="0 0 320 800">
        <g stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none">
          <path d="M155,20 L175,280 L175,780" />
          <path d="M80,110 L160,110" /><path d="M165,130 L280,130" /><path d="M70,300 L175,300" />
        </g>
        <rect x="235" y="160" width="55" height="150" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />
        <rect x="235" y="370" width="60" height="160" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />
      </svg>
      <div id="lotsCont"></div>
    </div>
  </div>
  <div class="modal-save-wrap">
    <button id="btnModalSave" onclick="doSave()">Save to Sheet</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let SCRIPT_URL = localStorage.getItem('fts_url') || '';
let actions = JSON.parse(localStorage.getItem('fts_actions') || '[]');
let running = false, t0 = 0, ival = null, splits = [], taxi = null, lot = null, tapN = 0, sessionISO = '', saving = false;

// Coordinates from your high-detail map version
const LOT_POS = {
  '23':{x:110,y:60},'22':{x:110,y:105},'21':{x:110,y:150},'20':{x:110,y:195},'19':{x:110,y:240},
  '18':{x:135,y:330},'17':{x:135,y:375},'16':{x:135,y:420},'15':{x:135,y:465},'14':{x:135,y:510},'13':{x:135,y:555},'12':{x:135,y:600},
  '1':{x:195,y:150},'1A':{x:195,y:190},'2':{x:195,y:230},'3':{x:195,y:275},'4':{x:195,y:320},'5':{x:195,y:365},'6':{x:195,y:410},'7':{x:195,y:455},'8':{x:195,y:500},'9':{x:195,y:545},
  '24':{x:235,y:110},'25':{x:275,y:110},'10':{x:225,y:590},'11':{x:225,y:635},'26':{x:225,y:680},'27':{x:225,y:725},
  '5B':{x:270,y:610},'4B':{x:270,y:650},'3B':{x:270,y:690},'2B':{x:270,y:730},'1B':{x:270,y:770}
};

window.onload = () => { if(SCRIPT_URL){ showApp(); buildGrid(); buildMap(); } };

function connect() {
  const url = document.getElementById('scriptUrl').value.trim();
  fetch(url + '?action=headers').then(r=>r.json()).then(data=>{
    localStorage.setItem('fts_url', url); SCRIPT_URL = url;
    localStorage.setItem('fts_actions', JSON.stringify(data.actions)); actions = data.actions;
    showApp(); buildGrid(); buildMap();
  }).catch(()=>alert('Connection Failed'));
}

function showApp() { document.getElementById('setup').style.display='none'; document.getElementById('app').classList.add('show'); }

function buildGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  actions.forEach((a,i)=>{
    const b = document.createElement('button'); b.className = 'act'; b.disabled = true; b.id = 'a'+i;
    b.innerHTML = `<span>${a.name}</span><span class="act-split" id="s${i}"></span>`;
    b.onclick = () => tap(i); g.appendChild(b);
  });
}

function buildMap() {
  const c = document.getElementById('lotsCont'); c.innerHTML = '';
  Object.entries(LOT_POS).forEach(([id, pos]) => {
    const b = document.createElement('div'); b.className = 'lot' + (id.endsWith('B') ? ' b-lot' : '');
    b.style.left = pos.x+'px'; b.style.top = pos.y+'px'; b.textContent = id;
    b.onclick = () => selL(b, id); c.appendChild(b);
  });
}

function start() {
  running = true; t0 = performance.now(); splits = []; tapN = 0; sessionISO = new Date().toISOString();
  document.getElementById('btnGo').disabled = true; document.getElementById('btnStop').disabled = false;
  document.getElementById('timer').className = 'run'; document.getElementById('sdot').classList.add('live');
  document.getElementById('sTxt').textContent = 'Running'; document.getElementById('btnFinish').classList.remove('show');
  actions.forEach((_,i)=>{ 
    const b = document.getElementById('a'+i); b.disabled = false; b.className = 'act'; 
    document.getElementById('s'+i).textContent = ''; 
    const oldN = b.querySelector('.act-num'); if(oldN) oldN.remove();
  });
  ival = setInterval(()=> document.getElementById('timer').textContent = fmt(performance.now()-t0), 41);
}

function stop() {
  running = false; clearInterval(ival);
  document.getElementById('btnGo').disabled = false; document.getElementById('btnStop').disabled = true;
  document.getElementById('timer').className = ''; document.getElementById('sdot').classList.remove('live');
  document.getElementById('sTxt').textContent = 'Stopped';
  actions.forEach((_,i)=> document.getElementById('a'+i).disabled = true);
  if(splits.length) document.getElementById('btnFinish').classList.add('show');
}

function tap(i) {
  if(!running) return;
  const now = performance.now(); tapN++;
  const delta = now - (splits.length ? (t0 + splits.reduce((a,b)=>a+b.deltaMs,0)) : t0);
  splits.push({actionName: actions[i].name, deltaMs: delta});
  const b = document.getElementById('a'+i); b.classList.add('done');
  document.getElementById('s'+i).textContent = fmt(delta);
  const n = document.createElement('span'); n.className='act-num'; n.textContent='#'+tapN; b.appendChild(n);
}

function openRoute() {
  taxi = null; lot = null; saving = false;
  document.querySelectorAll('.taxi-btn, .lot').forEach(el=>el.classList.remove('selected'));
  const sb = document.getElementById('btnModalSave');
  sb.classList.remove('ready'); sb.textContent = 'Save to Sheet';
  document.getElementById('routeModal').classList.add('show');
}

function closeRoute() { document.getElementById('routeModal').classList.remove('show'); }
function selT(btn) { document.querySelectorAll('.taxi-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); taxi = btn.dataset.taxi; checkReady(); }
function selL(btn, id) { document.querySelectorAll('.lot').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); lot = id; checkReady(); }
function checkReady() { const b = document.getElementById('btnModalSave'); if(taxi && lot) b.classList.add('ready'); else b.classList.remove('ready'); }

async function doSave() {
  if(saving) return; saving = true;
  const btn = document.getElementById('btnModalSave'); btn.textContent = 'Saving...'; btn.classList.remove('ready');
  const data = {startTimeISO: sessionISO, splits, taxiPoint: taxi, parkLot: lot};
  try {
    const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 8000);
    await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify(data), signal: controller.signal});
    toast('✓ Saved Successfully');
  } catch(e) {
    let q = JSON.parse(localStorage.getItem('fts_q') || '[]'); q.push(data);
    localStorage.setItem('fts_q', JSON.stringify(q)); toast('Saved Offline');
  }
  setTimeout(()=> { closeRoute(); reset(); }, 800);
}

function reset() {
  document.getElementById('timer').textContent = '0:00.000';
  document.getElementById('sTxt').textContent = 'Ready';
  document.getElementById('btnFinish').classList.remove('show');
  actions.forEach((_,i)=> {
    const b = document.getElementById('a'+i); b.className = 'act'; b.disabled = true;
    document.getElementById('s'+i).textContent = '';
    const n = b.querySelector('.act-num'); if(n) n.remove();
  });
}

function fmt(ms){ const t=Math.round(ms); return `${Math.floor(t/60000)}:${String(Math.floor((t%60000)/1000)).padStart(2,'0')}.${String(t%1000).padStart(3,'0')}`; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function sync() { 
  let q = JSON.parse(localStorage.getItem('fts_q') || '[]');
  if(!q.length) { toast('Queue Empty'); return; }
  toast('Syncing '+q.length+' items...');
  Promise.all(q.map(data => fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify(data)})))
    .then(() => { localStorage.setItem('fts_q', '[]'); toast('✓ Sync Complete'); })
    .catch(() => toast('Sync Failed'));
}
</script>
</body>
</html>
