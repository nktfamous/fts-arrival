<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FTS Arrival">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>FTS Arrival</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg:#0a0a0f; --bg2:#141418; --bg3:#1e1e24;
  --border:rgba(255,255,255,0.08);
  --accent:#3b82f6; --accent2:#60a5fa;
  --green:#22c55e; --red:#ef4444;
  --gold:#f59e0b; --purple:#a855f7;
  --taxi:#f97316; --sky:#38bdf8;
  --white:#fff; --off:#e2e8f0;
  --muted:rgba(226,232,240,0.38);
  --muted2:rgba(226,232,240,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;font-family:'Inter',-apple-system,sans-serif;}
html{height:100%;background:var(--bg);}
body{width:100%;height:100dvh;display:flex;flex-direction:column;position:fixed;inset:0;background:var(--bg);color:var(--white);overflow:hidden;}

/* ══ SETUP ══ */
#setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.s-icon{font-size:42px;margin-bottom:12px;}
.s-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.s-title span{color:var(--accent2);}
.s-desc{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:22px;max-width:280px;}
.s-lbl{width:100%;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.s-inp{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--white);font-size:13px;font-weight:500;margin-bottom:12px;outline:none;transition:border-color .2s;-webkit-user-select:text;user-select:text;}
.s-inp:focus{border-color:var(--accent);}
.s-inp::placeholder{color:var(--muted2);}
.s-btn{width:100%;padding:14px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;}
.s-btn:active{transform:scale(.97);}
.s-err{margin-top:10px;font-size:12px;color:var(--red);text-align:center;display:none;}
.s-err.show{display:block;}

/* ══ APP ══ */
#app{display:none;flex-direction:column;height:100%;overflow:hidden;}
#app.show{display:flex;}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),10px) 14px 6px;border-bottom:1px solid var(--border);background:var(--bg);gap:10px;}
.timer-block{display:flex;flex-direction:column;}
.elapsed-lbl{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;}
#timer{font-size:26px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:var(--off);line-height:1.1;transition:color .2s;}
#timer.run{color:var(--green);}
#timer.stp{color:var(--red);}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.spill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:50px;background:var(--bg3);border:1px solid var(--border);font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);transition:all .25s;white-space:nowrap;}
.spill.run{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:var(--green);}
.spill.stp{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:var(--red);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--muted2);transition:background .25s;}
.sdot.live{background:var(--green);animation:blink 1.1s infinite;}
.sdot.dead{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#queueBadge{display:none;align-items:center;gap:4px;padding:4px 8px;border-radius:50px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.35);font-size:10px;font-weight:700;color:var(--purple);cursor:pointer;white-space:nowrap;touch-action:manipulation;}
#queueBadge.show{display:flex;}
.qb-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:blink 1.4s infinite;flex-shrink:0;}
.grid-wrap{flex:1 1 0;min-height:0;padding:7px 9px 5px;}
#grid{width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:7px;}
.act{border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:var(--off);font-size:clamp(14px,4.5vw,18px);font-weight:700;letter-spacing:-.3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 8px;text-align:center;line-height:1.25;position:relative;overflow:hidden;transition:transform .1s,background .15s,border-color .15s;background-image:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 40%);width:100%;height:100%;touch-action:manipulation;}
.act:disabled{opacity:.13;cursor:not-allowed;}
.act:not(:disabled):active{transform:scale(.90);}
.act.done{background-color:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);}
.act-split{font-size:13px;font-weight:600;color:var(--green);font-variant-numeric:tabular-nums;}
.act-num{position:absolute;top:8px;right:10px;font-size:10px;font-weight:700;color:var(--gold);}
.btm{flex-shrink:0;padding:7px 9px max(env(safe-area-inset-bottom),10px);background:var(--bg);border-top:1px solid var(--border);}
#btnFinish{display:none;width:100%;padding:14px;margin-bottom:7px;border-radius:14px;border:none;background:linear-gradient(135deg,#f97316 0%,#ea580c 100%);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(249,115,22,.3);transition:opacity .2s;pointer-events:none;opacity:.45;touch-action:manipulation;}
#btnFinish.show{display:block;}
#btnFinish.ready{pointer-events:auto;opacity:1;}
#btnFinish:active{opacity:.85;}
.ctrl{display:grid;grid-template-columns:1fr 1fr auto;gap:7px;}
#btnGo,#btnStop,#btnSync{height:52px;border-radius:14px;border:none;font-size:16px;font-weight:700;letter-spacing:-.2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;touch-action:manipulation;}
#btnGo:disabled,#btnStop:disabled,#btnSync:disabled{opacity:.2;cursor:not-allowed;}
#btnGo:not(:disabled):active,#btnStop:not(:disabled):active{transform:scale(.94);}
#btnGo{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,.28);}
#btnStop{background:var(--bg3);color:var(--red);border:1px solid rgba(239,68,68,.2);}
#btnSync{width:52px;flex-shrink:0;background:var(--bg3);border:1px solid rgba(168,85,247,.2);color:var(--purple);flex-direction:column;gap:1px;font-size:11px;}
#btnSync.has-queue{border-color:rgba(168,85,247,.45);background:rgba(168,85,247,.1);animation:syncpulse 2s infinite;}
@keyframes syncpulse{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,0)}50%{box-shadow:0 0 0 5px rgba(168,85,247,.15)}}
.sync-icon{font-size:18px;line-height:1;}
.sync-count{font-size:10px;font-weight:800;color:var(--purple);line-height:1;display:none;}
.sync-count.show{display:block;}

/* ════════════════════════════════
   ROUTE MODAL
════════════════════════════════ */
#routeModal{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column;overflow:hidden;}
#routeModal.show{display:flex;}
.modal-hdr{flex-shrink:0;padding:max(env(safe-area-inset-top),14px) 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.modal-title span{color:var(--taxi);}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;}
.modal-close:active{opacity:.6;}
.route-summary{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--muted);min-height:38px;}
.rs-taxi{color:var(--taxi);font-weight:800;}
.rs-lot{color:var(--accent2);font-weight:800;}

/* Taxi buttons */
.taxi-section{flex-shrink:0;padding:10px 12px 8px;border-bottom:1px solid var(--border);}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.taxi-row{display:flex;gap:8px;}
.taxi-btn{flex:1;padding:12px 8px;border-radius:12px;border:2px solid rgba(249,115,22,.35);background:rgba(249,115,22,.07);color:var(--taxi);font-size:20px;font-weight:900;cursor:pointer;text-align:center;letter-spacing:1px;transition:all .15s;touch-action:manipulation;position:relative;}
.taxi-btn::before{content:'TAXI';position:absolute;top:5px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(249,115,22,.45);}
.taxi-btn:active{transform:scale(.93);}
.taxi-btn.selected{background:rgba(249,115,22,.2);border-color:var(--taxi);box-shadow:0 0 16px rgba(249,115,22,.25);}

/* Map area */
.map-scroll{flex:1 1 0;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 10px 4px;}

/* ── Airport schematic map ── */
.apron{
  position:relative;
  width:100%;
  background:rgba(255,255,255,0.015);
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
}

/* SVG map sits behind buttons */
.apron-svg{
  display:block;width:100%;height:auto;
}

/* Absolute-positioned lot buttons on top of SVG */
.apron-overlay{
  position:absolute;
  inset:0;
}

/* Individual lot button on map */
.lot{
  position:absolute;
  width:11.5%;
  aspect-ratio:1;
  border-radius:7px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(30,30,36,.85);
  color:var(--off);
  font-size:clamp(9px,2.8vw,13px);
  font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  touch-action:manipulation;
  transition:all .12s;
  backdrop-filter:blur(2px);
  text-align:center;line-height:1;
  padding:2px;
}
.lot:active{transform:scale(.85);}
.lot.selected{
  background:rgba(59,130,246,.35);
  border-color:var(--accent);
  color:var(--accent2);
  box-shadow:0 0 12px rgba(59,130,246,.4);
}

/* B-series lots — exact match to image */
.lot.b-lot {
  border: 2px solid #3b82f6; 
  background: #ffffff;       
  color: #3b82f6;            
  font-weight: 900;
  border-radius: 4px;        
}
.lot.b-lot.selected {
  background: #3b82f6;
  border-color: #3b82f6;
  color: #ffffff;            
  box-shadow: 0 0 16px rgba(59,130,246,0.5);
}

/* Modal save */
.modal-save-wrap{flex-shrink:0;padding:8px 12px max(env(safe-area-inset-bottom),12px);background:var(--bg);border-top:1px solid var(--border);}
#btnModalSave{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(34,197,94,.3);transition:all .15s;opacity:.3;pointer-events:none;touch-action:manipulation;}
#btnModalSave.ready{opacity:1;pointer-events:auto;}
#btnModalSave:active{transform:scale(.97);}

.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom)+75px);left:50%;transform:translateX(-50%) translateY(10px);padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;background:var(--bg3);color:var(--white);border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,.6);}
.toast.ok{background:#16a34a;border-color:transparent;}
.toast.er{background:var(--red);border-color:transparent;}
.toast.info{background:#6366f1;border-color:transparent;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="s-icon">✈</div>
  <div class="s-title">FTS <span>Arrival</span></div>
  <div class="s-desc">Paste your Apps Script URL to connect to your Google Sheet.</div>
  <div class="s-lbl">Apps Script URL</div>
  <input class="s-inp" id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/..." autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="s-btn" id="setupBtn" onclick="connectScript()">Connect & Load</button>
  <div class="s-err" id="setupErr"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="timer-block">
      <div class="elapsed-lbl">Elapsed</div>
      <div id="timer">0:00.000</div>
    </div>
    <div class="topbar-right">
      <div id="queueBadge" onclick="syncQueue()">
        <div class="qb-dot"></div>
        <span id="queueBadgeTxt">0</span>
      </div>
      <div class="spill" id="spill"><div class="sdot" id="sdot"></div><span id="sTxt">Ready</span></div>
    </div>
  </div>
  <div class="grid-wrap"><div id="grid"></div></div>
  <div class="btm">
    <button id="btnFinish" onclick="openRouteModal()">✈ Finish Route</button>
    <div class="ctrl">
      <button id="btnGo" onclick="startTimer()">▶ Start</button>
      <button id="btnStop" onclick="stopTimer()" disabled>■ Stop</button>
      <button id="btnSync" onclick="syncQueue()">
        <span class="sync-icon">⇪</span>
        <span class="sync-count" id="syncCount">0</span>
      </button>
    </div>
  </div>
</div>

<!-- ROUTE MODAL -->
<div id="routeModal">
  <div class="modal-hdr">
    <div class="modal-title">Finish <span>Route</span></div>
    <div class="modal-close" onclick="closeRouteModal()">✕</div>
  </div>
  <div class="route-summary" id="routeSummary">
    <span style="color:var(--muted)">Select Taxi Point → Parking Lot</span>
  </div>
  <!-- Taxi points -->
  <div class="taxi-section">
    <div class="sec-lbl">Taxi Entry Point</div>
    <div class="taxi-row">
      <button class="taxi-btn" data-taxi="A" onclick="selectTaxi(this)">A</button>
      <button class="taxi-btn" data-taxi="C" onclick="selectTaxi(this)">C</button>
      <button class="taxi-btn" data-taxi="H" onclick="selectTaxi(this)">H</button>
    </div>
  </div>
  <!-- Map -->
  <div class="map-scroll">
    <div class="apron" id="apron">
      <!-- SVG schematic background -->
      <svg class="apron-svg" viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg">
        <!-- Clean, minimalist building outlines matching your example -->
        <g stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none">
          <!-- Left side thin building -->
          <rect x="90" y="240" width="25" height="70" rx="2" />
          
          <!-- Right side main buildings -->
          <rect x="220" y="80" width="70" height="110" rx="2" />
          <rect x="220" y="200" width="70" height="30" rx="2" />
          <rect x="220" y="240" width="70" height="130" rx="2" />
          
          <!-- Bottom right building (Next to B-lots) -->
          <rect x="235" y="380" width="55" height="100" rx="2" />
        </g>
      </svg>
      <!-- Lot buttons overlaid — positioned as % of apron container -->
      <div class="apron-overlay" id="apronOverlay"></div>
    </div>
  </div>
  <div class="modal-save-wrap">
    <button id="btnModalSave" onclick="doSave()">Save to Sheet</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE_URL='fts_script_url', STORE_QUEUE='fts_offline_queue', STORE_ACTIONS='fts_cached_actions';
let SCRIPT_URL=localStorage.getItem(STORE_URL)||'';
let actions=[],splits=[],running=false,saving=false;
let t0=null,lastTap=null,ival=null,sessionISO=null,tapN=0,saveUnlockTimer=null;
let selTaxi=null,selLot=null;

// ── Lot positions on the apron SVG (% left, % top) ──
const LOT_POSITIONS = {
  // Left Column (Straight line down)
  '23':{l:14,t:8},  '22':{l:14,t:15}, '21':{l:14,t:22}, '20':{l:14,t:29},
  '19':{l:14,t:36}, '18':{l:14,t:43}, '17':{l:14,t:50}, '16':{l:14,t:57},
  '15':{l:14,t:64}, '14':{l:14,t:71}, '13':{l:14,t:78}, '12':{l:14,t:85},

  // Middle Column (Straight line down)
  '24':{l:42,t:8},  '25':{l:42,t:15}, '1' :{l:42,t:22}, '1A':{l:42,t:29},
  '2' :{l:42,t:36}, '3' :{l:42,t:43}, '4' :{l:42,t:50}, '5' :{l:42,t:57},
  '6' :{l:42,t:64}, '7' :{l:42,t:71}, '8' :{l:42,t:78}, '9' :{l:42,t:85},

  // Extra spots tucked neatly at the top/bottom edges
  '10':{l:28,t:85}, '11':{l:56,t:85},
  '26':{l:28,t:8},  '27':{l:56,t:8},

  // B series — Stacked perfectly vertically like your image
  '5B':{l:58,t:74},
  '4B':{l:58,t:80},
  '3B':{l:58,t:86},
  '2B':{l:58,t:92},
  '1B':{l:58,t:98},
};

function buildApron(){
  const overlay=document.getElementById('apronOverlay');
  overlay.innerHTML='';
  Object.entries(LOT_POSITIONS).forEach(([lot,pos])=>{
    const b=document.createElement('button');
    const isB=lot.endsWith('B');
    b.className='lot'+(isB?' b-lot':'');
    b.dataset.lot=lot;
    b.textContent=lot;
    b.style.left=pos.l+'%';
    b.style.top=pos.t+'%';
    b.addEventListener('click',()=>selectLot(b));
    overlay.appendChild(b);
  });
}

// ── Queue ──
function getQueue(){try{return JSON.parse(localStorage.getItem(STORE_QUEUE)||'[]');}catch{return[];}}
function saveQueue(q){localStorage.setItem(STORE_QUEUE,JSON.stringify(q));}
function pushToQueue(s){const q=getQueue();q.push(s);saveQueue(q);updateSyncUI();}
function updateSyncUI(){
  const n=getQueue().length;
  document.getElementById('syncCount').textContent=n;
  document.getElementById('syncCount').className=n>0?'sync-count show':'sync-count';
  document.getElementById('btnSync').className=n>0?'has-queue':'';
  const qb=document.getElementById('queueBadge');
  const qt=document.getElementById('queueBadgeTxt');
  if(n>0){qb.classList.add('show');qt.textContent=n+' offline';}
  else qb.classList.remove('show');
}

// ── Boot ──
window.addEventListener('load',()=>{
  updateSyncUI();
  buildApron();
  if(SCRIPT_URL){
    const cached=localStorage.getItem(STORE_ACTIONS);
    if(cached){try{actions=JSON.parse(cached);showApp();buildGrid();}catch(e){}}
    else showApp();
    loadHeaders();
  }
});

// ── Setup ──
async function connectScript(){
  const url=document.getElementById('scriptUrl').value.trim();
  const err=document.getElementById('setupErr');
  const btn=document.getElementById('setupBtn');
  err.classList.remove('show');
  if(!url.includes('script.google.com')){err.textContent="Doesn't look like an Apps Script URL.";err.classList.add('show');return;}
  btn.textContent='Connecting…';
  try{
    const res=await fetch(url+'?action=headers');
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    if(!data.actions?.length)throw new Error('No actions found');
    localStorage.setItem(STORE_URL,url);
    SCRIPT_URL=url;actions=data.actions;
    localStorage.setItem(STORE_ACTIONS,JSON.stringify(actions));
    showApp();buildGrid();
  }catch(e){err.textContent='Failed: '+e.message;err.classList.add('show');btn.textContent='Connect & Load';}
}
function showApp(){document.getElementById('setup').style.display='none';document.getElementById('app').classList.add('show');}
async function loadHeaders(){
  try{
    const res=await fetch(SCRIPT_URL+'?action=headers');
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    actions=data.actions;localStorage.setItem(STORE_ACTIONS,JSON.stringify(actions));buildGrid();
  }catch(e){console.log('Using cached actions');}
}

// ── Grid ──
function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  actions.forEach((a,i)=>{
    const b=document.createElement('button');
    b.className='act';b.id='ab'+i;b.disabled=true;
    b.innerHTML=`${a.name}<span class="act-split" id="as${i}"></span>`;
    b.addEventListener('click',()=>tapAction(i));
    g.appendChild(b);
  });
}

// ── Timer ──
function startTimer(){
  if(running)return;
  clearTimeout(saveUnlockTimer);hideFinish();
  running=true;saving=false;
  t0=lastTap=performance.now();sessionISO=new Date().toISOString();tapN=0;splits=[];
  ival=setInterval(()=>{document.getElementById('timer').textContent=fmt(performance.now()-t0);},41);
  document.getElementById('timer').className='run';setStatus('run');
  document.getElementById('btnGo').disabled=true;document.getElementById('btnStop').disabled=false;
  actions.forEach((_,i)=>{const b=document.getElementById('ab'+i);b.className='act';b.disabled=false;document.getElementById('as'+i).textContent='';const n=b.querySelector('.act-num');if(n)n.remove();});
}
function stopTimer(){
  if(!running)return;
  running=false;clearInterval(ival);ival=null;
  document.getElementById('timer').className='stp';setStatus('stp');
  document.getElementById('btnGo').disabled=false;document.getElementById('btnStop').disabled=true;
  actions.forEach((_,i)=>document.getElementById('ab'+i).disabled=true);
  if(splits.length>0){
    const btn=document.getElementById('btnFinish');
    btn.textContent='✈ Finish Route';btn.classList.add('show');btn.classList.remove('ready');
    btn.style.pointerEvents='none';btn.style.opacity='.45';
    saveUnlockTimer=setTimeout(()=>{btn.classList.add('ready');btn.style.pointerEvents='';btn.style.opacity='';},400);
  }
}
function hideFinish(){
  const btn=document.getElementById('btnFinish');
  btn.classList.remove('show','ready');btn.style.pointerEvents='none';btn.style.opacity='.45';
}
function tapAction(i){
  if(!running)return;
  const now=performance.now(),delta=now-lastTap;lastTap=now;tapN++;
  const name=actions[i].name;
  const ex=splits.findIndex(s=>s.actionName===name);if(ex!==-1)splits.splice(ex,1);
  splits.push({actionName:name,deltaMs:delta});
  const btn=document.getElementById('ab'+i);btn.className='act done';
  document.getElementById('as'+i).textContent=fmt(delta);
  let badge=btn.querySelector('.act-num');
  if(!badge){badge=document.createElement('span');badge.className='act-num';btn.appendChild(badge);}
  badge.textContent='#'+tapN;
}

// ── Route Modal ──
function openRouteModal(){
  saving=false;
  selTaxi=null;selLot=null;
  document.querySelectorAll('.taxi-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.lot').forEach(b=>b.classList.remove('selected'));
  const saveBtn=document.getElementById('btnModalSave');
  saveBtn.classList.remove('ready');saveBtn.textContent='Save to Sheet';
  saveBtn.style.pointerEvents='none';
  updateRouteSummary();
  document.getElementById('routeModal').classList.add('show');
}
function closeRouteModal(){
  saving=false;
  document.getElementById('routeModal').classList.remove('show');
}

function selectTaxi(btn){
  selTaxi=btn.dataset.taxi;
  if(btn.classList.contains('selected')){
    btn.classList.remove('selected');selTaxi=null;
  } else {
    document.querySelectorAll('.taxi-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  }
  updateRouteSummary();updateModalSaveBtn();
}

function selectLot(btn){
  selLot=btn.dataset.lot;
  if(btn.classList.contains('selected')){
    btn.classList.remove('selected');selLot=null;
  } else {
    document.querySelectorAll('.lot').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  }
  updateRouteSummary();updateModalSaveBtn();
}

function updateRouteSummary(){
  const el=document.getElementById('routeSummary');
  if(!selTaxi&&!selLot){el.innerHTML='<span style="color:var(--muted)">Select Taxi Point → Parking Lot</span>';return;}
  const t=selTaxi?`<span class="rs-taxi">${selTaxi}</span>`:'<span style="color:var(--muted)">?</span>';
  const l=selLot?`<span class="rs-lot">${selLot}</span>`:'<span style="color:var(--muted)">?</span>';
  el.innerHTML=`Taxi&nbsp;${t}&nbsp;<span style="color:var(--muted)">→</span>&nbsp;Lot&nbsp;${l}`;
}
function updateModalSaveBtn(){
  const btn=document.getElementById('btnModalSave');
  if(selTaxi&&selLot){btn.classList.add('ready');btn.style.pointerEvents='';}
  else{btn.classList.remove('ready');btn.style.pointerEvents='none';}
}

// ── Save ──
async function doSave(){
  if(saving)return;
  const btn=document.getElementById('btnModalSave');
  if(!selTaxi||!selLot)return;

  saving=true;
  btn.textContent='Saving…';btn.style.pointerEvents='none';btn.style.opacity='.6';

  const session={startTimeISO:sessionISO,splits:[...splits],taxiPoint:selTaxi,parkLot:selLot};

  let savedOk=false;
  let savedRow=null;

  try{
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),8000);
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(session),signal:controller.signal});
    clearTimeout(timeoutId);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    savedOk=true;savedRow=data.row;
  }catch(e){
    savedOk=false;
  }

  saving=false;
  closeRouteModal();

  if(savedOk){
    showToast('✓ Saved to row '+savedRow,'ok');
  }else{
    pushToQueue(session);
    showToast('Offline — queued ('+getQueue().length+' pending)','info');
  }

  setTimeout(resetAll,1400);
}

// ── Sync ──
async function syncQueue(){
  const q=getQueue();
  if(q.length===0){showToast('Nothing to sync','info');return;}
  const sb=document.getElementById('btnSync');sb.disabled=true;
  showToast('Syncing '+q.length+'…','info');
  let saved=0,failed=[];
  for(const session of q){
    try{
      const controller=new AbortController();
      const tid=setTimeout(()=>controller.abort(),8000);
      const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(session),signal:controller.signal});
      clearTimeout(tid);
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      saved++;
    }catch(e){failed.push(session);}
  }
  saveQueue(failed);updateSyncUI();sb.disabled=false;
  if(failed.length===0)showToast('✓ All '+saved+' synced!','ok');
  else showToast('Synced '+saved+', '+failed.length+' failed','er');
}

// ── Reset ──
function resetAll(){
  clearTimeout(saveUnlockTimer);clearInterval(ival);ival=null;
  running=false;saving=false;tapN=0;splits=[];t0=null;lastTap=null;selTaxi=null;selLot=null;
  document.getElementById('timer').textContent='0:00.000';document.getElementById('timer').className='';
  document.getElementById('btnGo').disabled=false;document.getElementById('btnStop').disabled=true;
  hideFinish();setStatus('');updateSyncUI();
  actions.forEach((_,i)=>{const b=document.getElementById('ab'+i);b.className='act';b.disabled=true;document.getElementById('as'+i).textContent='';const n=b.querySelector('.act-num');if(n)n.remove();});
}

function fmt(ms){const t=Math.round(ms);return`${Math.floor(t/60000)}:${String(Math.floor((t%60000)/1000)).padStart(2,'0')}.${String(t%1000).padStart(3,'0')}`;}
function setStatus(type){document.getElementById('spill').className='spill'+(type?' '+type:'');document.getElementById('sdot').className='sdot'+(type==='run'?' live':type==='stp'?' dead':'');document.getElementById('sTxt').textContent=type==='run'?'Running':type==='stp'?'Stopped':'Ready';}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>{t.className='toast '+type;},3200);}
</script>
